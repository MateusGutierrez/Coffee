<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee — Premium Handcrafted Coffee & Specialty Drinks</title>
    <meta name="description" content="Discover our artisan coffee selection — from bold espresso to creamy cappuccinos. Handpicked single-origin beans, expertly roasted and brewed to perfection." />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/png" href="/coffee.png" />
    <link rel="canonical" href="https://coffee.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Coffee — Premium Handcrafted Coffee & Specialty Drinks" />
    <meta property="og:description" content="Discover our artisan coffee selection — from bold espresso to creamy cappuccinos. Handpicked single-origin beans, expertly roasted and brewed to perfection." />
    <meta property="og:image" content="/coffee.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Coffee — Premium Handcrafted Coffee & Specialty Drinks" />
    <meta name="twitter:description" content="Discover our artisan coffee selection — from bold espresso to creamy cappuccinos." />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CafeOrCoffeeShop",
      "name": "Coffee",
      "description": "Premium handcrafted coffee and specialty drinks",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "456, Raq Blvd. #404",
        "addressLocality": "Los Angeles",
        "addressRegion": "CA",
        "postalCode": "90210"
      },
      "telephone": "(555) 987-6543",
      "email": "hello@jsmcocktail.com",
      "servesCuisine": "Coffee",
      "openingHoursSpecification": [
        { "@type": "OpeningHoursSpecification", "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday"], "opens": "11:00", "closes": "00:00" },
        { "@type": "OpeningHoursSpecification", "dayOfWeek": "Friday", "opens": "11:00", "closes": "02:00" },
        { "@type": "OpeningHoursSpecification", "dayOfWeek": "Saturday", "opens": "09:00", "closes": "02:00" },
        { "@type": "OpeningHoursSpecification", "dayOfWeek": "Sunday", "opens": "09:00", "closes": "01:00" }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
